<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Website</title>

    <style>
        body{
            font-family: Arial;
            margin:0;
        }

        header{
            background:lightblue;
            text-align:center;
            padding:15px;
        }

        nav{
            background:orange;
            text-align:center;
            padding:10px;
        }

        nav button{
            margin:5px;
            padding:8px 12px;
            border:none;
            background:white;
            cursor:pointer;
            font-weight:bold;
        }

        .banner img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .container{
            display:flex;
        }

        aside{
            width:30%;
            background:lightgreen;
            padding:10px;
        }

        main{
            width:70%;
            background:skyblue;
            padding:15px;
            min-height:150px;
        }

        footer{
            background:lightgray;
            text-align:center;
            padding:10px;
        }
    </style>
</head>

<body>

    <header>
        <h2>My Restaurant</h2>
    </header>

    <!-- Navigation -->
    <nav>
        <button onclick="showPage('about')">About</button>
        <button onclick="showPage('menu')">Menu</button>
        <button onclick="showPage('contact')">Contact</button>
    </nav>

    <!-- Banner -->
    <div class="banner">
        <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">
    </div>

    <div class="container">

        <!-- Sidebar -->
        <aside>
            <h3>Offers</h3>
            <button onclick="showOffer()">Today's Offer</button>
        </aside>

        <!-- Content Area -->
        <main id="content">
            <h3>Welcome</h3>
            <p>Welcome to our restaurant website.</p>
        </main>

    </div>

    <footer>
        © 2026 My Restaurant
    </footer>
    <script src="script1.js"></script>
</body>
</html>
